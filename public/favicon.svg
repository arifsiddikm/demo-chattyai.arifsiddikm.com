<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="eye" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Antenna -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="5" r="3" fill="white" opacity="0.9"/>
  <!-- Head -->
  <rect x="14" y="14" width="36" height="28" rx="8" fill="white" opacity="0.15"/>
  <rect x="14" y="14" width="36" height="28" rx="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <!-- Eyes -->
  <ellipse cx="24" cy="27" rx="5" ry="5" fill="url(#eye)"/>
  <ellipse cx="40" cy="27" rx="5" ry="5" fill="url(#eye)"/>
  <circle cx="24" cy="27" r="2.5" fill="white"/>
  <circle cx="40" cy="27" r="2.5" fill="white"/>
  <circle cx="25" cy="26" r="1.2" fill="#1a1a2e"/>
  <circle cx="41" cy="26" r="1.2" fill="#1a1a2e"/>
  <!-- Smile -->
  <path d="M26 35 Q32 40 38 35" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.9"/>
  <!-- Body base -->
  <rect x="20" y="44" width="24" height="14" rx="5" fill="white" opacity="0.12"/>
  <circle cx="28" cy="51" r="2" fill="white" opacity="0.7"/>
  <circle cx="36" cy="51" r="2" fill="#a78bfa" opacity="0.9"/>
</svg>
